<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>2024 年度目標 | 陳芯霈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-pink: #f8c9d4; --dark-pink: #e099ad; --bg-color: #fff9fa; }
        body { background-color: var(--bg-color); padding: 50px 0; }
        .goal-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; border-left: 8px solid var(--primary-pink); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .goal-title { color: var(--dark-pink); font-weight: bold; font-size: 1.25rem; }
        .back-btn { background-color: var(--primary-pink); color: #7a4a58; border-radius: 50px; text-decoration: none; padding: 10px 25px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container" style="max-width: 700px;">
    <h2 class="text-center mb-5" style="color: var(--dark-pink); font-weight: bold;">2026年度成長目標</h2>
    
    <div class="goal-card">
        <div class="goal-title">📜 取得專業證照</div>
        <p class="mb-0 text-muted">深耕資管領域，考取相關技術證照以充實專業實力。</p>
    </div>
    
    <div class="goal-card">
        <div class="goal-title">💻 畢業專題製作</div>
        <p class="mb-0 text-muted">全心投入大三專題專案開發，打造具備雲端整合能力的畢業代表作。</p>
    </div>
    
    <div class="goal-card">
        <div class="goal-title">🏆 比賽參與</div>
        <p class="mb-0 text-muted">挑戰自我，將課堂所學應用於實務競賽，累積跨域合作經驗。</p>
    </div>


    <div class="goal-card">
        <div class="goal-title">🚗 考取駕照</div>
        <p class="mb-0 text-muted">提升個人行動力與生活技能，完成道路安全訓練。</p>
    </div>

    <div class="text-center mt-5">
        <a href="/" class="back-btn">← 回首頁</a>
    </div>
</div>
</body>
</html>
