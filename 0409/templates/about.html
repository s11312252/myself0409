<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>關於我 | 陳芯霈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-pink: #f8c9d4; --dark-pink: #e099ad; --bg-color: #fff9fa; }
        body { background-color: var(--bg-color); padding: 50px 0; color: #5a5a5a; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
        
        /* 容器卡片樣式 */
        .glass-card { background: white; border-radius: 25px; padding: 40px; box-shadow: 0 10px 30px rgba(224, 153, 173, 0.15); border: 1px solid rgba(248, 201, 212, 0.5); }
        
        /* 調整後的照片樣式：尺寸與首頁格子一致 */
        .about-img {
            width: 320px;          /* 寬度調整為與首頁卡片相近的尺寸 */
            height: 200px;         /* 固定高度，讓它像個小橫幅 */
            object-fit: cover;     /* 確保照片不變形 */
            border-radius: 20px;   /* 圓角效果 */
            border: 4px solid white; 
            box-shadow: 0 8px 20px rgba(248, 201, 212, 0.4); 
            margin-bottom: 30px;
        }

        .info-item { margin-bottom: 20px; font-size: 1.1rem; }
        .info-label { color: var(--dark-pink); font-weight: bold; width: 100px; display: inline-block; }
        .back-btn { background-color: var(--primary-pink); color: #7a4a58; border-radius: 50px; text-decoration: none; padding: 12px 35px; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background-color: var(--dark-pink); color: white; }
    </style>
</head>
<body>
<div class="container" style="max-width: 800px;">
    <div class="glass-card text-center">
        <h2 class="mb-4" style="color: var(--dark-pink); font-weight: bold;">👤 自我介紹</h2>

        
        <div class="mb-4">
            <img src="{{ url_for('static', filename='about_photo.jpg') }}" alt="個人照" class="about-img">
        </div>



        <div class="text-start ps-md-5">
            <div class="info-item"><span class="info-label">姓名</span> 陳芯霈</div>
            <div class="info-item"><span class="info-label">電子郵箱</span> lucyamy23780983@gmail.com</div>
            <div class="info-item"><span class="info-label">目前就讀</span> 靜宜大學 資訊管理系</div>
            <hr>
            <h4 class="mt-4 mb-3" style="color: var(--dark-pink);">💼 工作經歷</h4>
            <p class="fw-bold">診所行政人員 ‧ 網路小說配音配樂 ‧ 國中陪讀</p>
            <p>目前擔任兼職人員，具備優秀的邏輯處理與負責任的工作態度。在工作中磨練出細心的觀察力，並能與團隊成員維持優良的溝通互動，展現資管人穩定且系統化的執行力。</p>
        </div>

        <div class="mt-5">
            <a href="/" class="back-btn">← 回到首頁</a>
        </div>
    </div>
</div>
</body>
</html>
